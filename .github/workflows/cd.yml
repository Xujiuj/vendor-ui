name: CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-vendor-ui
  cancel-in-progress: true

env:
  DEPLOY_SERVICE: vendor-ui
  DEPLOY_PORT: 17000
  BACKEND_PORT: 18000
  PUBLIC_PATH: /vendor/

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Configure public path
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s#^VITE_APP_CONTEXT_PATH *=.*#VITE_APP_CONTEXT_PATH = '$PUBLIC_PATH'#" .env.production
          sed -i "s#^VITE_APP_BASE_API *=.*#VITE_APP_BASE_API = '${PUBLIC_PATH%/}/prod-api'#" .env.production

      - name: Build
        run: npm run build:prod

      - name: Package dist
        run: tar -C dist -czf vendor-ui-dist.tar.gz .

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PORT_SECRET: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/fx' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_PASSWORD" ]; then
            echo "Deployment skipped because deploy secrets are incomplete."
            exit 0
          fi
          REMOTE_ARCHIVE="$DEPLOY_PATH/$DEPLOY_SERVICE-${GITHUB_RUN_ID}-dist.tar.gz"
          sudo apt-get update
          sudo apt-get install -y sshpass
          cat > deploy-ui.sh <<'EOF'
          set -euo pipefail
          public_path_trimmed="${PUBLIC_PATH#/}"
          public_path_trimmed="${public_path_trimmed%/}"
          echo "$SUDO_PASSWORD" | sudo -S rm -rf "$DEPLOY_PATH/www/$DEPLOY_SERVICE"
          echo "$SUDO_PASSWORD" | sudo -S mkdir -p "$DEPLOY_PATH/www/$DEPLOY_SERVICE"
          echo "$SUDO_PASSWORD" | sudo -S chown -R "$USER:$USER" "$DEPLOY_PATH/www/$DEPLOY_SERVICE"
          tar -xzf "$REMOTE_ARCHIVE" -C "$DEPLOY_PATH/www/$DEPLOY_SERVICE"
          rm -f "$REMOTE_ARCHIVE"
          echo "$SUDO_PASSWORD" | sudo -S ln -sfn "$DEPLOY_PATH/www/$DEPLOY_SERVICE" "$DEPLOY_PATH/www/$public_path_trimmed"
          echo "$SUDO_PASSWORD" | sudo -S apt-get update
          echo "$SUDO_PASSWORD" | sudo -S apt-get install -y nginx
          cat > "/tmp/$DEPLOY_SERVICE.conf" <<NGINX
          server {
              listen $DEPLOY_PORT;
              server_name _;
              root $DEPLOY_PATH/www;
              index index.html;

              location = / {
                  return 302 $PUBLIC_PATH;
              }

              location $PUBLIC_PATH {
                  try_files \$uri \$uri/ ${PUBLIC_PATH}index.html;
              }

              location ${PUBLIC_PATH}prod-api/ {
                  proxy_pass http://127.0.0.1:$BACKEND_PORT/;
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          NGINX
          echo "$SUDO_PASSWORD" | sudo -S mv "/tmp/$DEPLOY_SERVICE.conf" "/etc/nginx/conf.d/$DEPLOY_SERVICE.conf"
          echo "$SUDO_PASSWORD" | sudo -S mkdir -p /etc/nginx/fx-locations
          cat > "/tmp/$DEPLOY_SERVICE-public.conf" <<NGINX
          location $PUBLIC_PATH {
              root $DEPLOY_PATH/www;
              try_files \$uri \$uri/ ${PUBLIC_PATH}index.html;
          }

          location ${PUBLIC_PATH}prod-api/ {
              proxy_pass http://127.0.0.1:$BACKEND_PORT/;
              proxy_http_version 1.1;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
          }
          NGINX
          echo "$SUDO_PASSWORD" | sudo -S mv "/tmp/$DEPLOY_SERVICE-public.conf" "/etc/nginx/fx-locations/$DEPLOY_SERVICE.conf"
          cat > /tmp/fx-public.conf <<NGINX
          server {
              listen 80 default_server;
              server_name _;
              root $DEPLOY_PATH/www;
              index index.html;

              location = / {
                  return 302 /vendor/;
              }

              include /etc/nginx/fx-locations/*.conf;
          }
          NGINX
          echo "$SUDO_PASSWORD" | sudo -S rm -f /etc/nginx/sites-enabled/default
          echo "$SUDO_PASSWORD" | sudo -S mv /tmp/fx-public.conf /etc/nginx/conf.d/fx-public.conf
          echo "$SUDO_PASSWORD" | sudo -S nginx -t
          echo "$SUDO_PASSWORD" | sudo -S systemctl enable --now nginx
          echo "$SUDO_PASSWORD" | sudo -S systemctl restart nginx
          verify_url() {
            local url="$1"
            if curl -fsS --max-time 8 "$url" | grep -q '"code":200'; then
              echo "$DEPLOY_SERVICE proxy is healthy at $url"
              return 0
            fi
            echo "$DEPLOY_SERVICE proxy health check failed at $url" >&2
            return 1
          }
          if ! verify_url "http://127.0.0.1:$DEPLOY_PORT${PUBLIC_PATH}prod-api/auth/code" \
            || ! verify_url "http://127.0.0.1${PUBLIC_PATH}prod-api/auth/code"; then
            echo "$SUDO_PASSWORD" | sudo -S nginx -T || true
            echo "$SUDO_PASSWORD" | sudo -S tail -n 120 /var/log/nginx/access.log || true
            echo "$SUDO_PASSWORD" | sudo -S tail -n 120 /var/log/nginx/error.log || true
            exit 1
          fi
          EOF
          sshpass -p "$DEPLOY_PASSWORD" ssh -p "$DEPLOY_PORT_SECRET" -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          sshpass -p "$DEPLOY_PASSWORD" scp -P "$DEPLOY_PORT_SECRET" -o StrictHostKeyChecking=accept-new vendor-ui-dist.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_ARCHIVE"
          sshpass -p "$DEPLOY_PASSWORD" ssh -p "$DEPLOY_PORT_SECRET" -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_SERVICE='$DEPLOY_SERVICE' DEPLOY_PORT='$DEPLOY_PORT' BACKEND_PORT='$BACKEND_PORT' PUBLIC_PATH='$PUBLIC_PATH' REMOTE_ARCHIVE='$REMOTE_ARCHIVE' SUDO_PASSWORD='$DEPLOY_PASSWORD' bash -s" < deploy-ui.sh
