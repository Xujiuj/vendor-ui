name: CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-vendor-ui
  cancel-in-progress: true

env:
  DEPLOY_SERVICE: vendor-ui
  DEPLOY_PORT: 17000
  BACKEND_PORT: 18000

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build:prod

      - name: Package dist
        run: tar -C dist -czf vendor-ui-dist.tar.gz .

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PORT_SECRET: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/fx' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_PASSWORD" ]; then
            echo "Deployment skipped because deploy secrets are incomplete."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y sshpass
          cat > deploy-ui.sh <<'EOF'
          set -euo pipefail
          echo "$SUDO_PASSWORD" | sudo -S mkdir -p "$DEPLOY_PATH/www/$DEPLOY_SERVICE"
          tar -xzf "$DEPLOY_PATH/$DEPLOY_SERVICE-dist.tar.gz" -C "$DEPLOY_PATH/www/$DEPLOY_SERVICE"
          rm -f "$DEPLOY_PATH/$DEPLOY_SERVICE-dist.tar.gz"
          echo "$SUDO_PASSWORD" | sudo -S apt-get update
          echo "$SUDO_PASSWORD" | sudo -S apt-get install -y nginx
          cat > "/tmp/$DEPLOY_SERVICE.conf" <<NGINX
          server {
              listen $DEPLOY_PORT;
              server_name _;
              root $DEPLOY_PATH/www/$DEPLOY_SERVICE;
              index index.html;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /prod-api/ {
                  proxy_pass http://127.0.0.1:$BACKEND_PORT/;
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          NGINX
          echo "$SUDO_PASSWORD" | sudo -S mv "/tmp/$DEPLOY_SERVICE.conf" "/etc/nginx/conf.d/$DEPLOY_SERVICE.conf"
          echo "$SUDO_PASSWORD" | sudo -S nginx -t
          echo "$SUDO_PASSWORD" | sudo -S systemctl enable --now nginx
          echo "$SUDO_PASSWORD" | sudo -S systemctl reload nginx
          EOF
          sshpass -p "$DEPLOY_PASSWORD" ssh -p "$DEPLOY_PORT_SECRET" -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          sshpass -p "$DEPLOY_PASSWORD" scp -P "$DEPLOY_PORT_SECRET" -o StrictHostKeyChecking=accept-new vendor-ui-dist.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/$DEPLOY_SERVICE-dist.tar.gz"
          sshpass -p "$DEPLOY_PASSWORD" ssh -p "$DEPLOY_PORT_SECRET" -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_SERVICE='$DEPLOY_SERVICE' DEPLOY_PORT='$DEPLOY_PORT' BACKEND_PORT='$BACKEND_PORT' SUDO_PASSWORD='$DEPLOY_PASSWORD' bash -s" < deploy-ui.sh
